app_env:
  TZ: Europe/Moscow
  PORT: 80
  VITE_STREAMVI_API_HOST: https://napi.streamvi.io
  VITE_CENTRIFUGO_HOST: wss://events.streamvi.io


default:
  replicaCount: 1
  service: {}
  resources:
    limits:
      cpu: 100m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 256Mi
  health_checks: {}

deployments:
  nginx:
    service:
      enabled: true
      name: http
      type: ClusterIP
      port: 80
      targetPort: 80

imagePullSecrets:
  - name: gitlabregistry

imageCredentials:
  registry: gitlab.collabox.dev:8443
  username: docuch@collabox.dev
  password: '{{ .Env.K8S_GITLAB_PULL_TOKEN }}'
  email: docuch@collabox.dev

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cloudflare-dns: 'true'
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'false'
  hosts:
    - host: 'plugin-counter.{{ .Env.KUBE_DOMAIN_PROD }}'
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - 'plugin-counter.{{ .Env.KUBE_DOMAIN_PROD }}'

secrets: []
configmaps:
  vhosts.conf: |
    server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/public;
    index index.html;

        location / {
            try_files $uri $uri/ /index.html =404;
        }
    }

volumes:
  - name: 'nginx-conf'
    configMap:
      name: 'nginx-conf'

volumeMounts:
  - name: 'nginx-conf'
    mountPath: /etc/nginx/conf.d/default.conf
    subPath: vhosts.conf
